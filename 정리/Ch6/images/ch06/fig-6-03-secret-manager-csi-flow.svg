<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#eef5ff"/><stop offset="1" stop-color="#dbeafe"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#effdf4"/><stop offset="1" stop-color="#dcfce7"/></linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#faf5ff"/><stop offset="1" stop-color="#f3e8ff"/></linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fffaf0"/><stop offset="1" stop-color="#fef3c7"/></linearGradient>
    <marker id="aBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#2563eb"/></marker>
    <marker id="aOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#d97706"/></marker>
    <style>text{font-family:Arial,'Noto Sans KR','Apple SD Gothic Neo',sans-serif;fill:#111827}.title{font-size:54px;font-weight:700}.sub{font-size:25px;fill:#4b5563}.h{font-size:25px;font-weight:700}.b{font-size:20px;font-weight:700}.s{font-size:17px;fill:#586174}.cap{font-size:20px;fill:#586174}.box{stroke-width:2.5}.line{fill:none;stroke-width:4}</style>
  </defs>
  <rect width="1672" height="941" fill="#fff"/>
  <text x="836" y="63" text-anchor="middle" class="title">Secret Manager에서 Pod까지의 시크릿 흐름</text>
  <text x="836" y="108" text-anchor="middle" class="sub">Workload Identity로 인증하고 GKE CSI Driver가 파일로 마운트</text>

  <rect x="45" y="158" width="1582" height="612" rx="24" fill="#fcfcfd" stroke="#9ca3af" stroke-width="2.5"/>
  <text x="80" y="204" class="h">시크릿 데이터 경로</text>

  <rect class="box" x="85" y="300" width="240" height="150" rx="20" fill="url(#orange)" stroke="#d97706"/>
  <text x="205" y="351" text-anchor="middle" class="h">Secret Manager</text><text x="205" y="392" text-anchor="middle" class="s">valkey-password</text><text x="205" y="423" text-anchor="middle" class="s">버전 · 감사 로그</text>
  <rect class="box" x="425" y="300" width="240" height="150" rx="20" fill="url(#purple)" stroke="#7c3aed"/>
  <text x="545" y="351" text-anchor="middle" class="h">Workload Identity</text><text x="545" y="392" text-anchor="middle" class="s">notiflex-ksa</text><text x="545" y="423" text-anchor="middle" class="s">IAM 최소 권한</text>
  <rect class="box" x="765" y="300" width="240" height="150" rx="20" fill="url(#blue)" stroke="#2563eb"/>
  <text x="885" y="351" text-anchor="middle" class="h">GKE CSI Driver</text><text x="885" y="392" text-anchor="middle" class="s">provider: gke</text><text x="885" y="423" text-anchor="middle" class="s">secrets-store-gke</text>
  <rect class="box" x="1105" y="300" width="220" height="150" rx="20" fill="url(#green)" stroke="#16a34a"/>
  <text x="1215" y="351" text-anchor="middle" class="h">Pod Volume</text><text x="1215" y="392" text-anchor="middle" class="s">/mnt/secrets</text><text x="1215" y="423" text-anchor="middle" class="s">readOnly</text>
  <rect class="box" x="1420" y="300" width="165" height="150" rx="20" fill="#fff" stroke="#374151"/>
  <text x="1502" y="351" text-anchor="middle" class="h">Notiflex</text><text x="1502" y="392" text-anchor="middle" class="b">API</text><text x="1502" y="423" text-anchor="middle" class="s">파일 읽기</text>

  <path class="line" d="M325 375H415" stroke="#d97706" marker-end="url(#aOrange)"/><text x="370" y="358" text-anchor="middle" class="s">접근</text>
  <path class="line" d="M665 375H755" stroke="#2563eb" marker-end="url(#aBlue)"/><text x="710" y="358" text-anchor="middle" class="s">OIDC</text>
  <path class="line" d="M1005 375H1095" stroke="#2563eb" marker-end="url(#aBlue)"/><text x="1050" y="358" text-anchor="middle" class="s">mount</text>
  <path class="line" d="M1325 375H1410" stroke="#16a34a" marker-end="url(#aBlue)"/>

  <text x="80" y="533" class="h">제어·정책 경로</text>
  <rect class="box" x="255" y="575" width="330" height="112" rx="18" fill="url(#orange)" stroke="#d97706"/>
  <text x="420" y="620" text-anchor="middle" class="h">SecretProviderClass</text><text x="420" y="658" text-anchor="middle" class="s">가져올 시크릿·버전·파일명 선언</text>
  <rect class="box" x="700" y="575" width="330" height="112" rx="18" fill="url(#purple)" stroke="#7c3aed"/>
  <text x="865" y="620" text-anchor="middle" class="h">IAM Binding</text><text x="865" y="658" text-anchor="middle" class="s">secretAccessor + workloadIdentityUser</text>
  <rect class="box" x="1145" y="575" width="330" height="112" rx="18" fill="#f8fafc" stroke="#64748b"/>
  <text x="1310" y="620" text-anchor="middle" class="h">운영 효과</text><text x="1310" y="658" text-anchor="middle" class="s">Git 무시크릿 · SA 키 제거 · 감사 가능</text>
  <path class="line" d="M585 631H690" stroke="#d97706" stroke-dasharray="9 8" marker-end="url(#aOrange)"/>
  <path class="line" d="M1030 631H1135" stroke="#7c3aed" stroke-dasharray="9 8" marker-end="url(#aBlue)"/>
  <path class="line" d="M420 575C420 525 885 525 885 460" stroke="#d97706" stroke-dasharray="9 8" marker-end="url(#aOrange)"/>

  <line x1="45" y1="827" x2="1627" y2="827" stroke="#94a3b8" stroke-width="2"/>
  <text x="836" y="877" text-anchor="middle" class="cap">그림 6-3. 시크릿 원본은 Secret Manager에 두고, Pod에는 CSI 볼륨의 읽기 전용 파일만 제공한다.</text>
</svg>
