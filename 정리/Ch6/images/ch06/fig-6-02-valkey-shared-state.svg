<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#eef5ff"/><stop offset="1" stop-color="#dbeafe"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#effdf4"/><stop offset="1" stop-color="#dcfce7"/></linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff5f5"/><stop offset="1" stop-color="#fee2e2"/></linearGradient>
    <marker id="aBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#2563eb"/></marker>
    <marker id="aGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#16a34a"/></marker>
    <style>text{font-family:Arial,'Noto Sans KR','Apple SD Gothic Neo',sans-serif;fill:#111827}.title{font-size:54px;font-weight:700}.sub{font-size:25px;fill:#4b5563}.h{font-size:31px;font-weight:700}.b{font-size:22px;font-weight:700}.s{font-size:18px;fill:#586174}.cap{font-size:20px;fill:#586174}.box{stroke-width:2.5}.line{fill:none;stroke-width:4}</style>
  </defs>
  <rect width="1672" height="941" fill="#fff"/>
  <text x="836" y="63" text-anchor="middle" class="title">Pod별 인메모리와 Valkey 공유 상태 비교</text>
  <text x="836" y="108" text-anchor="middle" class="sub">중복되는 로컬 카운터를 원자적 INCR 하나로 통합</text>

  <rect x="48" y="154" width="756" height="626" rx="24" fill="#fcfcfd" stroke="#9ca3af" stroke-width="2.5"/>
  <text x="426" y="207" text-anchor="middle" class="h">기존: Pod마다 독립 카운터</text>
  <text x="426" y="250" text-anchor="middle" class="s">replica가 늘어나면 같은 ID가 반복된다</text>
  <rect class="box" x="110" y="300" width="240" height="160" rx="18" fill="url(#blue)" stroke="#2563eb"/>
  <text x="230" y="352" text-anchor="middle" class="b">Notiflex Pod A</text><text x="230" y="401" text-anchor="middle" class="h">ID 1</text><text x="230" y="436" text-anchor="middle" class="s">local atomic counter</text>
  <rect class="box" x="498" y="300" width="240" height="160" rx="18" fill="url(#blue)" stroke="#2563eb"/>
  <text x="618" y="352" text-anchor="middle" class="b">Notiflex Pod B</text><text x="618" y="401" text-anchor="middle" class="h">ID 1</text><text x="618" y="436" text-anchor="middle" class="s">local atomic counter</text>
  <rect class="box" x="120" y="530" width="608" height="136" rx="18" fill="url(#red)" stroke="#ef2626"/>
  <text x="424" y="580" text-anchor="middle" class="b" fill="#b91c1c">중복 ID · 재시작 시 초기화</text><text x="424" y="622" text-anchor="middle" class="s">Pod의 수명주기와 비즈니스 상태가 함께 묶인다</text>
  <path class="line" d="M230 460V518" stroke="#ef2626"/><path class="line" d="M618 460V518" stroke="#ef2626"/>

  <rect x="868" y="154" width="756" height="626" rx="24" fill="#fcfcfd" stroke="#9ca3af" stroke-width="2.5"/>
  <text x="1246" y="207" text-anchor="middle" class="h">개선: Valkey 공유 카운터</text>
  <text x="1246" y="250" text-anchor="middle" class="s">모든 Pod가 같은 키에 원자적으로 접근한다</text>
  <rect class="box" x="930" y="310" width="190" height="120" rx="18" fill="url(#blue)" stroke="#2563eb"/>
  <text x="1025" y="360" text-anchor="middle" class="b">Pod A</text><text x="1025" y="396" text-anchor="middle" class="s">request 1, 3, 5</text>
  <rect class="box" x="1370" y="310" width="190" height="120" rx="18" fill="url(#blue)" stroke="#2563eb"/>
  <text x="1465" y="360" text-anchor="middle" class="b">Pod B</text><text x="1465" y="396" text-anchor="middle" class="s">request 2, 4, 6</text>
  <rect class="box" x="1125" y="486" width="250" height="150" rx="24" fill="url(#green)" stroke="#16a34a"/>
  <text x="1250" y="536" text-anchor="middle" class="h">Valkey</text><text x="1250" y="580" text-anchor="middle" class="b">INCR notiflex:id</text><text x="1250" y="614" text-anchor="middle" class="s">1 · 2 · 3 · 4 · 5 · 6</text>
  <path class="line" d="M1025 430C1025 500 1090 530 1115 548" stroke="#16a34a" marker-end="url(#aGreen)"/>
  <path class="line" d="M1465 430C1465 500 1400 530 1385 548" stroke="#16a34a" marker-end="url(#aGreen)"/>
  <rect x="970" y="680" width="560" height="56" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="1250" y="716" text-anchor="middle" class="b" fill="#166534">Pod 재시작·확장 후에도 순서와 상태 유지</text>

  <line x1="45" y1="827" x2="1627" y2="827" stroke="#94a3b8" stroke-width="2"/>
  <text x="836" y="877" text-anchor="middle" class="cap">그림 6-2. Pod별 카운터는 중복되지만, Valkey INCR은 모든 replica가 하나의 순서를 공유하게 한다.</text>
</svg>
